<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Simone Martins – Pet Sitter</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { primary: '#d12d6d', dark: '#111827' }
                    }
                }
            }
        }
    </script>

    <script>
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="assets/js/modoescuro.js" defer></script>
    <script src="assets/js/main.js" defer></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">

    <div id="header-placeholder"></div>

    <section class="pt-32 pb-12 bg-brand-primary text-white text-center">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl md:text-5xl font-serif font-bold mb-4">Book an Appointment</h1>
            <p class="opacity-90 max-w-2xl mx-auto">Agende um horário ou tire suas dúvidas. Estou pronta para cuidar do seu pet no Grajaú e região!</p>
        </div>
    </section>

    <main class="py-20 container mx-auto px-4">
        <div class="grid lg:grid-cols-3 gap-16">
            
            <div class="lg:col-span-2">
                <h2 class="text-2xl font-bold mb-6">Envie uma Mensagem</h2>
                <form id="form-whatsapp" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="font-semibold text-sm">Seu Nome</label>
                        <input type="text" id="nome" placeholder="Jane Smith" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-brand-primary outline-none transition" required>
                    </div>
                    <div class="space-y-2">
                        <label class="font-semibold text-sm">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(21) 97204-5256" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-brand-primary outline-none transition" required>
                    </div>
                    <div class="md:col-span-2 space-y-2">
                        <label class="font-semibold text-sm">E-mail</label>
                        <input type="email" id="email" placeholder="jane@exemplo.com" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-brand-primary outline-none transition">
                    </div>
                    <div class="space-y-2">
                        <label class="font-semibold text-sm">Nome do Pet</label>
                        <input type="text" id="pet_nome" placeholder="Ex: Max" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-brand-primary outline-none transition">
                    </div>
                    <div class="space-y-2">
                        <label class="font-semibold text-sm">Tipo do Pet</label>
                        <select id="pet_tipo" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-brand-primary outline-none transition">
                            <option value="Cachorro">Cachorro</option>
                            <option value="Gato">Gato</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 space-y-2">
                        <label class="font-semibold text-sm">Serviço de Interesse</label>
                        <select id="servico" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-brand-primary outline-none transition">
                            <option value="Dog Walking">Dog Walking</option>
                            <option value="Pet Sitting">Pet Sitting</option>
                            <option value="Hospedagem">Hospedagem Domiciliar</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 space-y-2">
                        <label class="font-semibold text-sm">Informações Adicionais</label>
                        <textarea id="mensagem" rows="5" placeholder="Conte sobre as necessidades do seu pet..." class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-brand-primary outline-none transition"></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <button type="submit" class="bg-brand-primary text-white px-10 py-4 rounded-full font-bold hover:bg-pink-700 hover:scale-105 transition shadow-lg">
                            Enviar via WhatsApp
                        </button>
                    </div>
                </form>
            </div>

            <div class="space-y-10">
                <div>
                    <h2 class="text-2xl font-bold mb-6">Dados para Contato</h2>
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-pink-100 dark:bg-pink-900/30 flex items-center justify-center text-brand-primary">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 uppercase font-bold">E-mail</p>
                                <p class="font-medium">simonempbr@outlook.com</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-pink-100 dark:bg-pink-900/30 flex items-center justify-center text-brand-primary">
                                <i class="fas fa-phone"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 uppercase font-bold">Telefone</p>
                                <p class="font-medium">(21) 97204-5256</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-pink-100 dark:bg-pink-900/30 flex items-center justify-center text-brand-primary">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 uppercase font-bold">Horário</p>
                                <p class="font-medium text-sm">Seg-Sex: 9:00 AM - 9:00 PM</p>
                                <p class="text-sm">Sab-Dom: 8:00 AM - 5:00 PM</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="rounded-3xl overflow-hidden shadow-xl h-64 border-4 border-white dark:border-gray-800">
                    <iframe 
                        class="w-full h-full" 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1837.7667232208072!2d-43.25056708762515!3d-22.924151323321557!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x997ecf31b4a2f7%3A0x1020b7e96fbb77e3!2sPra%C3%A7a%20Verdun!5e0!3m2!1spt-BR!2sbr!4v1709420000000!5m2!1spt-BR!2sbr" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        document.getElementById('form-whatsapp').addEventListener('submit', function(e) {
            e.preventDefault();
            const phoneNumber = "5521972045256";
            const nome = document.getElementById('nome').value;
            const tel = document.getElementById('telefone').value;
            const pet = document.getElementById('pet_nome').value;
            const servico = document.getElementById('servico').value;
            const msg = document.getElementById('mensagem').value;

            const texto = `Olá Simone! 👋%0AGostaria de agendar um horário:%0A%0A*Nome:* ${nome}%0A*Tel:* ${tel}%0A*Pet:* ${pet}%0A*Serviço:* ${servico}%0A*Mensagem:* ${msg}`;
            window.open(`https://wa.me/${phoneNumber}?text=${texto}`, '_blank');
        });
    </script>
</body>
</html>
